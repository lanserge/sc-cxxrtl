# SPDX-License-Identifier: ISC
name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Recent Yosys with CXXRTL + yosys-config (needed by the cxxrtl-vpi build
      # the end-to-end test drives). Installed before setup-python.
      - uses: YosysHQ/setup-oss-cad-suite@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"  # cocotb supports up to 3.13

      - name: Build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install
        # Pulls siliconcompiler, cxxrtl-vpi (from PyPI), and cocotb.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Tests (flow construction + parameters + end-to-end on CXXRTL)
        run: python -m pytest tests/test_flow.py -p no:cacheprovider -q
